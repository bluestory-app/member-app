<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BlueStory Admin</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .ticket {
      font-size: 48px;
      margin: 20px 0;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      background: #eee;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>BlueStory Admin</h1>
  <p id="status">読み込み中...</p>

  <p>現在チケット</p>
  <div class="ticket" id="ticket">-</div>

  <button onclick="updateTicket(1)">+1</button>
  <button onclick="updateTicket(-1)">-1</button>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";

const ADMIN_ID = "Uc36f9a2cd5ab6dd416591d92f46315ff";

async function main() {

  await liff.init({
    liffId: "2009495218-2KrxBegx"
  });

  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href });
    return;
  }

  const profile = await liff.getProfile();
  const userId = profile.userId;

  // 🔒 管理者ロック
  if (userId !== ADMIN_ID) {
    document.body.innerHTML = `
      <div style="padding:40px;text-align:center;">
        <h2>アクセス不可</h2>
        <p>このページは管理者のみ利用できます。</p>
      </div>
    `;
    return;
  }

  document.getElementById("status").innerText = "ログインOK";

  loadTicket(userId);
}

// チケット取得
async function loadTicket(userId) {
  try {
    const res = await fetch(`${GAS_URL}?type=get&userId=${userId}`);
    const data = await res.json();
    document.getElementById("ticket").innerText = data.ticket || 0;
  } catch (e) {
    document.getElementById("status").innerText = "通信エラー";
  }
}

// チケット更新
async function updateTicket(num) {
  const profile = await liff.getProfile();
  const userId = profile.userId;

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "update",
      userId: userId,
      value: num
    })
  });

  loadTicket(userId);
}

main();
</script>

</body>
</html>
