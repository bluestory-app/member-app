<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BlueStory Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 24px;
}
.card {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
}
.ticket {
  font-size: 40px;
  font-weight: bold;
  margin: 12px 0 20px;
}
button {
  display: inline-block;
  margin: 8px 4px;
  padding: 12px 18px;
  font-size: 16px;
  color: black;
  background: #eee;
  border: none;
  border-radius: 8px;
}
.lock-message {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="card" id="adminArea" style="display:none;">
  <h2>BlueStory Admin</h2>

  <p id="status">読み込み中...</p>
  <p id="name"></p>

  <p>現在チケット</p>
  <p id="ticket" class="ticket">-</p>

  <div>
    <button onclick="plusTicket()">+1</button>
    <button onclick="minusTicket()">-1</button>
  </div>

  <p id="id" style="font-size:12px;color:#999;"></p>
</div>

<div class="card" id="lockArea" style="display:none;">
  <h2>管理画面</h2>
  <p class="lock-message">このページは運営者のみ利用できます。</p>
  <p>ご不明な場合は管理者へご連絡ください。</p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";
const ADMIN_USER_ID = "Uc36f9a2cd5ab6dd416591d92f46315ff";

let currentUserId = "";
let currentName = "";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    currentUserId = profile.userId;
    currentName = profile.displayName;

    if (currentUserId !== ADMIN_USER_ID) {
      document.getElementById("lockArea").style.display = "block";
      return;
    }

    document.getElementById("adminArea").style.display = "block";
    document.getElementById("status").textContent = "取得完了";
    document.getElementById("name").textContent = profile.displayName;
    document.getElementById("id").textContent = profile.userId;

    await loadTicket();

  } catch (e) {
    document.getElementById("adminArea").style.display = "block";
    document.getElementById("status").textContent = "エラー";
    document.getElementById("name").textContent = String(e);
  }
}

async function loadTicket() {
  const url =
    GAS_URL +
    "?mode=get" +
    "&userId=" + encodeURIComponent(currentUserId);

  const res = await fetch(url);
  const text = await res.text();
  document.getElementById("ticket").textContent = text;
}

async function plusTicket() {
  const url =
    GAS_URL +
    "?mode=plus" +
    "&name=" + encodeURIComponent(currentName) +
    "&userId=" + encodeURIComponent(currentUserId);

  await fetch(url);
  await loadTicket();
}

async function minusTicket() {
  const url =
    GAS_URL +
    "?mode=minus" +
    "&name=" + encodeURIComponent(currentName) +
    "&userId=" + encodeURIComponent(currentUserId);

  await fetch(url);
  await loadTicket();
}

main();
</script>

</body>
</html>
