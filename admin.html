<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BlueStory Admin</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      max-width: 420px;
      margin: 40px auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    }
    h1, h2 {
      margin-top: 0;
    }
    .ticket {
      font-size: 48px;
      margin: 20px 0;
      font-weight: bold;
    }
    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      background: #eee;
    }
    #adminArea, #lockArea {
      display: none;
    }
  </style>
</head>
<body>

<div class="card" id="adminArea">
  <h1>管理者ページ</h1>
  <p id="status">読み込み中...</p>
  <p id="name"></p>

  <p>現在チケット</p>
  <div class="ticket" id="ticket">-</div>

  <button onclick="changeTicket('plus')">+1</button>
  <button onclick="changeTicket('minus')">-1</button>

  <p id="id" style="font-size:12px;color:#999;"></p>
</div>

<div class="card" id="lockArea">
  <h2>アクセス不可</h2>
  <p>このページは管理者のみ利用できます。</p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const ADMIN_LIFF_ID = "2009495218-2KrxBegx";

let currentUserId = "";
let currentName = "";

function showLock() {
  document.getElementById("adminArea").style.display = "none";
  document.getElementById("lockArea").style.display = "block";
}

function showAdmin() {
  document.getElementById("lockArea").style.display = "none";
  document.getElementById("adminArea").style.display = "block";
}

async function isAdminUser(userId) {
  const url =
    GAS_URL +
    "?mode=admincheck" +
    "&userId=" + encodeURIComponent(userId);

  const res = await fetch(url);
  const text = await res.text();
  return text === "ADMIN";
}

async function main() {
  try {
    await liff.init({ liffId: ADMIN_LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    currentUserId = profile.userId;
    currentName = profile.displayName;

    const isAdmin = await isAdminUser(currentUserId);

    if (!isAdmin) {
      showLock();
      return;
    }

    showAdmin();
    document.getElementById("status").textContent = "ログインOK";
    document.getElementById("name").textContent = profile.displayName;
    document.getElementById("id").textContent = profile.userId;

    await loadTicket();

  } catch (e) {
    showLock();
  }
}

async function loadTicket() {
  try {
    const url =
      GAS_URL +
      "?mode=get" +
      "&userId=" + encodeURIComponent(currentUserId);

    const res = await fetch(url);
    const text = await res.text();
    document.getElementById("ticket").textContent = text;
  } catch (e) {
    document.getElementById("status").textContent = "通信エラー";
  }
}

async function changeTicket(mode) {
  try {
    const url =
      GAS_URL +
      "?mode=" + mode +
      "&name=" + encodeURIComponent(currentName) +
      "&userId=" + encodeURIComponent(currentUserId);

    await fetch(url);
    await loadTicket();
  } catch (e) {
    document.getElementById("status").textContent = "通信エラー";
  }
}

main();
</script>

</body>
</html>
