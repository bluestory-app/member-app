<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlueStory Member</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: 24px auto;
  background: #fff;
  padding: 24px 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

h2 {
  margin: 0 0 16px;
  font-size: 28px;
  text-align: center;
}

#status {
  text-align: center;
  font-size: 16px;
  margin-bottom: 8px;
}

#name {
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
}

.label {
  font-size: 16px;
  color: #555;
  margin-bottom: 8px;
  text-align: center;
}

.ticket {
  font-size: 56px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 24px;
}

/* 🔥 ボタン統一 */
.btn {
  display: block;
  width: 100%;
  height: 56px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: #eee;
}

/* メインボタン */
.btn-main {
  background: #000;
  color: #fff;
}

/* サブ */
.btn-sub {
  background: #ddd;
}

/* 押した時 */
.btn:active {
  transform: scale(0.98);
}

#id {
  font-size: 12px;
  color: #999;
  text-align: center;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">
  <h2>BlueStory</h2>

  <p id="status">読み込み中...</p>
  <p id="name"></p>

  <div class="label">残りチケット</div>
  <div id="ticket" class="ticket">-</div>

  <a class="btn btn-main"
     href="https://www.bluestory.jp/diver-medical-participant-questionnaire/"
     target="_blank">
    メディカルチェック
  </a>

  <p id="id"></p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let currentUserId = "";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    currentUserId = profile.userId;

    document.getElementById("status").textContent = "取得完了";
    document.getElementById("name").textContent = profile.displayName;
    document.getElementById("id").textContent = profile.userId;

    const registerUrl =
      GAS_URL +
      "?mode=register" +
      "&name=" + encodeURIComponent(profile.displayName) +
      "&userId=" + encodeURIComponent(profile.userId);

    await fetch(registerUrl);

    await loadTicket();

  } catch (e) {
    document.getElementById("status").textContent = "エラー";
  }
}

async function loadTicket() {
  const url =
    GAS_URL +
    "?mode=get" +
    "&userId=" + encodeURIComponent(currentUserId);

  const res = await fetch(url);
  const text = await res.text();
  document.getElementById("ticket").textContent = text;
}

main();
</script>

</body>
</html>
