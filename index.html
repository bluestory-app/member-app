<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlueStory Member</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: 24px auto;
  background: #fff;
  padding: 28px 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

h2 {
  margin: 0 0 12px;
  font-size: 28px;
  text-align: center;
}

#status {
  text-align: center;
  font-size: 16px;
  margin-bottom: 6px;
}

#name {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 20px;
}

.label {
  font-size: 16px;
  color: #555;
  text-align: center;
  margin-bottom: 6px;
}

.ticket {
  font-size: 56px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 24px;
}

.btn {
  display: block;
  width: 100%;
  height: 52px;
  line-height: 52px;
  text-align: center;
  font-size: 17px;
  border-radius: 12px;
  border: none;
  text-decoration: none;
  margin-top: 10px;
  box-sizing: border-box;
}

.btn-main {
  background: #222;
  color: #fff;
}

.btn-sub {
  background: #e9e9e9;
  color: #111;
}

.btn:active {
  transform: scale(0.98);
  opacity: 0.9;
}

#id {
  font-size: 12px;
  color: #999;
  text-align: center;
  margin-top: 14px;
}

.lock-message {
  font-size: 18px;
  font-weight: bold;
  color: #333;
  line-height: 1.6;
  text-align: center;
}
</style>
</head>

<body>

<div class="card">
  <h2>BlueStory</h2>

  <p id="status">読み込み中...</p>
  <p id="name"></p>

  <div id="memberArea" style="display:none;">
    <div class="label">残りチケット</div>
    <div id="ticket" class="ticket">-</div>

    <a class="btn btn-main"
       href="https://www.bluestory.jp/diver-medical-participant-questionnaire/"
       target="_blank">
      メディカルチェック
    </a>

    <button class="btn btn-sub" onclick="goPayment()">支払い</button>
  </div>

  <div id="lockArea" style="display:none;">
    <p class="lock-message">このページは会員登録済みの方のみご利用いただけます。</p>
    <p style="text-align:center;">ご不明な場合はスタッフへご連絡ください。</p>
  </div>

  <p id="id"></p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let currentUserId = "";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();
    currentUserId = profile.userId;

    document.getElementById("name").textContent = profile.displayName;
    document.getElementById("id").textContent = profile.userId;

    const registerUrl =
      GAS_URL +
      "?mode=register" +
      "&name=" + encodeURIComponent(profile.displayName) +
      "&userId=" + encodeURIComponent(profile.userId);

    await fetch(registerUrl);

    const statusUrl =
      GAS_URL +
      "?mode=membercheck" +
      "&userId=" + encodeURIComponent(profile.userId);

    const statusRes = await fetch(statusUrl);
    const memberStatus = (await statusRes.text()).trim();

    if (memberStatus === "OK") {
      document.getElementById("status").textContent = "取得完了";
      document.getElementById("memberArea").style.display = "block";
      await loadTicket();
    } else {
      document.getElementById("status").textContent = "利用制限";
      document.getElementById("lockArea").style.display = "block";
    }

  } catch (e) {
    document.getElementById("status").textContent = "エラー";
  }
}

async function loadTicket() {
  if (!currentUserId) return;

  const url =
    GAS_URL +
    "?mode=get" +
    "&userId=" + encodeURIComponent(currentUserId);

  const res = await fetch(url);
  const text = await res.text();
  document.getElementById("ticket").textContent = text;
}

function goPayment() {
  location.href = "payment.html";
}

document.addEventListener("visibilitychange", async () => {
  if (document.visibilityState === "visible") {
    await loadTicket();
  }
});

window.addEventListener("pageshow", async () => {
  await loadTicket();
});

main();
</script>

</body>
</html>
