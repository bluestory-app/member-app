<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>支払い方法</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: 24px auto;
  background: #fff;
  padding: 24px 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  text-align: center;
}

h2 {
  margin: 0 0 12px;
  font-size: 28px;
}

.desc {
  font-size: 16px;
  color: #555;
  margin-bottom: 20px;
}

.btn {
  display: block;
  width: 100%;
  min-height: 56px;
  margin-top: 12px;
  padding: 0 16px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  text-align: center;
  box-sizing: border-box;
}

.btn-paypay {
  background: #222;
  color: #fff;
}

.btn-cash {
  background: #e9e9e9;
  color: #111;
}

.btn:disabled {
  opacity: 0.45;
}

#qr {
  display: none;
  width: 100%;
  max-width: 320px;
  margin: 24px auto 0;
  border-radius: 12px;
}

.big-message {
  font-size: 18px;
  font-weight: bold;
  margin-top: 18px;
  line-height: 1.6;
}

#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>支払い方法</h2>
  <p class="desc">該当するものを選んでください</p>

  <button class="btn btn-paypay" onclick="handlePay('あり','PayPay')">チケット使用 + 差額をPayPay</button>
  <button class="btn btn-paypay" onclick="handlePay('なし','PayPay')">チケット不使用 + 満額をPayPay</button>
  <button class="btn btn-cash" onclick="handlePay('あり','現金')">チケット使用 + 差額を現金</button>
  <button class="btn btn-cash" onclick="handlePay('なし','現金')">チケット不使用 + 満額を現金</button>

  <img id="qr" src="https://bluestory-app.github.io/member-app/761AD27B-ABEC-4633-9496-D2DE2C25EC68.png?v=2">

  <div id="status"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let profileData = {};

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  profileData = await liff.getProfile();
}

function disableButtons() {
  const buttons = document.querySelectorAll("button");
  buttons.forEach(btn => btn.disabled = true);
}

function showQR() {
  const qr = document.getElementById("qr");
  qr.style.display = "block";

  setTimeout(() => {
    qr.scrollIntoView({ behavior: "smooth" });
  }, 100);
}

async function handlePay(ticket, method) {
  disableButtons();

  const url =
    GAS_URL +
    "?mode=payment" +
    "&name=" + encodeURIComponent(profileData.displayName) +
    "&userId=" + encodeURIComponent(profileData.userId) +
    "&ticket=" + encodeURIComponent(ticket) +
    "&method=" + encodeURIComponent(method);

  await fetch(url);

  let message = "";

  if (method === "PayPay") {
    message = "<div class='big-message'>このQRを読み込んでお支払いしてください</div>";
    showQR();
  }

  if (method === "現金") {
    message = "<div class='big-message'>スタッフに現金をお渡しください</div>";
  }

  document.getElementById("status").innerHTML = message;
}

main();
</script>

</body>
</html>
