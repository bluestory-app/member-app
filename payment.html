<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>支払い方法</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 12px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  text-align: center;
}

h2 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #eee;
}

button:disabled {
  opacity: 0.4;
}

/* QR */
#qr {
  display: none;
  width: 100%;
  max-width: 360px;
  margin: 24px auto;
}

/* 強調表示 */
.big-message {
  font-size: 18px;
  font-weight: bold;
  margin-top: 16px;
}

#status {
  margin-top: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>支払い方法</h2>
  <p>該当するものを選んでください</p>

  <button onclick="handlePay('あり','PayPay')">チケット使用 + 差額をPayPay</button>
  <button onclick="handlePay('なし','PayPay')">チケット不使用 + 満額をPayPay</button>
  <button onclick="handlePay('あり','現金')">チケット使用 + 差額を現金</button>
  <button onclick="handlePay('なし','現金')">チケット不使用 + 満額を現金</button>

  <img id="qr"
       src="https://bluestory-app.github.io/member-app/761AD27B-ABEC-4633-9496-D2DE2C25EC68.png?v=2">

  <div id="status"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let profileData = {};

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  profileData = await liff.getProfile();
}

// ボタン制御
function disableButtons() {
  const buttons = document.querySelectorAll("button");
  buttons.forEach(btn => btn.disabled = true);
}

// QR表示
function showQR() {
  const qr = document.getElementById("qr");
  qr.style.display = "block";

  setTimeout(() => {
    qr.scrollIntoView({ behavior: "smooth" });
  }, 100);
}

// 支払い処理
async function handlePay(ticket, method) {
  disableButtons();

  const url =
    GAS_URL +
    "?mode=payment" +
    "&name=" + encodeURIComponent(profileData.displayName) +
    "&userId=" + encodeURIComponent(profileData.userId) +
    "&ticket=" + encodeURIComponent(ticket) +
    "&method=" + encodeURIComponent(method);

  await fetch(url);

  let message = "";

  if (method === "PayPay") {
    message = "<div class='big-message'>このQRを読み込んでお支払いしてください</div>";
    showQR();
  }

  if (method === "現金") {
    message = "<div class='big-message'>スタッフに現金をお渡しください</div>";
  }

  document.getElementById("status").innerHTML = message;
}

main();
</script>

</body>
</html>
