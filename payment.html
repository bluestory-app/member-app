<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>支払い方法</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 16px;
  margin: 0;
}
.card {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 16px;
  border-radius: 12px;
}
h2 {
  margin-top: 0;
}
button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #eee;
}
#status {
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="card">
  <h2>支払い方法</h2>
  <p>該当するものを選んでください</p>

  <button onclick="savePayment('あり','PayPay')">チケット使用 + 差額をPayPay</button>
  <button onclick="savePayment('なし','PayPay')">チケット不使用 + 満額をPayPay</button>
  <button onclick="savePayment('あり','現金')">チケット使用 + 差額を現金</button>
  <button onclick="savePayment('なし','現金')">チケット不使用 + 満額を現金</button>

  <!-- QR表示用 -->
  <img id="qr" src="paypay.png" style="display:none;width:200px;margin-top:20px;">

  <p id="status"></p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let profileData = {};

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  profileData = await liff.getProfile();
}

// ★②：UX改善済み
async function savePayment(ticket, method) {
  const url =
    GAS_URL +
    "?mode=payment" +
    "&name=" + encodeURIComponent(profileData.displayName) +
    "&userId=" + encodeURIComponent(profileData.userId) +
    "&ticket=" + encodeURIComponent(ticket) +
    "&method=" + encodeURIComponent(method);

  await fetch(url);

  let message = "記録しました";

  if (method === "PayPay") {
    message = "このあとPayPayでお支払いしてください";
    showQR();
  }

  if (method === "現金") {
    message = "スタッフに現金をお渡しください";
  }

  document.getElementById("status").textContent = message;
}

main();
</script>

</body>
</html>
