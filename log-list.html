<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ログ履歴</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 12px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 16px;
  border-radius: 12px;
}

.item {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.lock {
  text-align: center;
  font-weight: bold;
  margin-top: 40px;
}
</style>
</head>

<body>

<div class="card">
  <h2>ログ履歴</h2>

  <div id="list">読み込み中...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

let userId = "";

async function main() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  // ロックチェック
  const checkUrl =
    GAS_URL +
    "?mode=membercheck" +
    "&userId=" + encodeURIComponent(userId);

  const res = await fetch(checkUrl);
  const result = await res.text();

  if (result !== "OK") {
    document.getElementById("list").innerHTML =
      "<div class='lock'>ログは会員のみ閲覧できます</div>";
    return;
  }

  loadLogs();
}

async function loadLogs() {
  const url =
    GAS_URL +
    "?mode=loglist" +
    "&userId=" + encodeURIComponent(userId);

  const res = await fetch(url);
  const data = await res.json();

  if (data.length === 0) {
    document.getElementById("list").textContent = "ログがありません";
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `
      <div class="item">
        <b>${item.point}</b><br>
        ${item.date} / ${item.weather}<br>
        水温: ${item.water}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

main();
</script>

</body>
</html>
