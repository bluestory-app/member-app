<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ログ履歴</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 12px;
}
.card {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 16px;
  border-radius: 12px;
}
.item {
  border-bottom: 1px solid #eee;
  padding: 12px 0;
}
.title {
  font-weight: bold;
  margin-bottom: 6px;
}
.msg {
  font-weight: bold;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="card">
  <h2>ログ履歴</h2>
  <div id="list">読み込み中...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-3Egr37Ub";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    // 会員チェック
    const checkRes = await fetch(
      GAS_URL +
      "?mode=membercheck" +
      "&userId=" + encodeURIComponent(userId)
    );
    const checkText = await checkRes.text();

    if (checkText !== "OK") {
      document.getElementById("list").innerHTML =
        "<div class='msg'>ログは会員のみ閲覧できます</div>";
      return;
    }

    // ログ取得
    const logRes = await fetch(
      GAS_URL +
      "?mode=loglist" +
      "&userId=" + encodeURIComponent(userId)
    );
    const data = await logRes.json();

    if (!data || data.length === 0) {
      document.getElementById("list").innerHTML =
        "<div class='msg'>ログがありません</div>";
      return;
    }

    let html = "";

    data.forEach(item => {
      const dateText = String(item.date || "").split("T")[0];
      html += `
        <div class="item">
          <div class="title">${dateText} / ${item.point || ""}</div>
          <div>本数：${item.count || ""}</div>
          <div>天候：${item.weather || ""}</div>
          <div>透明度：${item.visibility || ""}</div>
          <div>水温：${item.water || ""}</div>
          <div>${item.memo || ""}</div>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;

  } catch (e) {
    document.getElementById("list").innerHTML =
      "<div class='msg'>エラー: " + String(e) + "</div>";
  }
}

main();
</script>

</body>
</html>
