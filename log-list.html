<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログ履歴</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 420px;
  margin: 24px auto;
}

.card {
  background: #fff;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.05);
}

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 8px;
}

.sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 4px;
}

.empty {
  text-align: center;
  margin-top: 80px;
  color: #999;
}

.lock-card {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.05);
  text-align: center;
}

.btn {
  display: inline-block;
  width: 100%;
  height: 48px;
  line-height: 48px;
  margin-top: 12px;
  border: none;
  border-radius: 10px;
  background: #eee;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container" id="app">
  <div class="empty">読み込み中...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-2KrxBegx";

let currentUserId = "";

// 会員チェック
async function checkMember() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href });
    return false;
  }

  const profile = await liff.getProfile();
  currentUserId = profile.userId;

  const res = await fetch(
    GAS_URL +
    "?mode=membercheck" +
    "&userId=" + encodeURIComponent(currentUserId)
  );

  const text = (await res.text()).trim();

  if (text !== "OK") {
    document.getElementById("app").innerHTML = `
      <div class="lock-card">
        <h2>ログ履歴</h2>
        <p>このページは会員登録済みの方のみ利用できます。</p>
      </div>
    `;
    return false;
  }

  return true;
}

// ログ取得
async function loadLogs() {
  try {
    const res = await fetch(
      GAS_URL +
      "?mode=loglist" +
      "&userId=" + encodeURIComponent(currentUserId)
    );

    const data = await res.json();

    if (!data || data.length === 0) {
      document.getElementById("app").innerHTML =
        `<div class="empty">ログがありません</div>`;
      return;
    }

    let html = "";

    data.forEach(log => {
      const dateText = log.date ? String(log.date).split("T")[0] : "-";

      html += `
        <div class="card">
          <div class="title">${dateText}</div>
          <div class="sub">ポイント：${log.point || "-"}</div>
          <div class="sub">本数：${log.count || "-"}</div>
          <div class="sub">天候：${log.weather || "-"}</div>
          <div class="sub">透明度：${log.visibility || "-"}</div>
          <div class="sub">水温：${log.water || "-"}</div>
          <div class="sub">メモ：${log.memo || "-"}</div>
          <button class="btn" onclick="editLog('${log.logId}')">編集</button>
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="empty">読み込みエラー</div>`;
  }
}

function editLog(logId) {
  location.href = "log.html?editId=" + encodeURIComponent(logId);
}

async function main() {
  const ok = await checkMember();
  if (!ok) return;

  await loadLogs();
}

main();
</script>

</body>
</html>
