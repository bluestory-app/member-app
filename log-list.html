<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログ一覧</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: #fff;
  padding: 16px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.05);
}

.title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 8px;
}

.sub {
  font-size: 14px;
  color: #666;
}

.empty {
  text-align: center;
  margin-top: 80px;
  color: #999;
}
</style>
</head>

<body>

<div class="container" id="app">
  <div class="empty">読み込み中...</div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-2KrxBegx";

// 管理者ID
const ADMIN_IDS = [
  "Uc36f9a2cd5ab6dd416591d92f46315ff"
];

// =====================
// 管理者チェック
// =====================
async function checkAdmin() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return false;
    }

    const profile = await liff.getProfile();
    const userId = profile.userId;

    if (!ADMIN_IDS.includes(userId)) {
      document.body.innerHTML = `
        <div style="
          max-width:420px;
          margin:100px auto;
          background:#fff;
          padding:24px;
          border-radius:16px;
          text-align:center;
        ">
          <h2>アクセス不可</h2>
          <p>このページは管理者のみ利用できます。</p>
        </div>
      `;
      return false;
    }

    return true;

  } catch (e) {
    document.body.innerHTML = `
      <div style="text-align:center;margin-top:100px;">
        アクセス不可
      </div>
    `;
    return false;
  }
}

// =====================
// ログ取得
// =====================
async function loadLogs() {
  try {
    const res = await fetch(GAS_URL + "?mode=getLogs");
    const data = await res.json();

    if (!data || data.length === 0) {
      document.getElementById("app").innerHTML =
        `<div class="empty">ログがありません</div>`;
      return;
    }

    let html = "";

    data.reverse().forEach(log => {
      html += `
        <div class="card">
          <div class="title">${log.date || "-"}</div>
          <div class="sub">ポイント：${log.divePoint || "-"}</div>
          <div class="sub">本数：${log.diveCount || "-"}</div>
          <div class="sub">水温：${log.waterTemp || "-"}</div>
          <div class="sub">メモ：${log.memo || "-"}</div>
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  } catch (e) {
    document.getElementById("app").innerHTML =
      `<div class="empty">読み込みエラー</div>`;
  }
}

// =====================
// 初期処理
// =====================
async function main() {

  if (!(await checkAdmin())) return;

  await loadLogs();
}

main();
</script>

</body>
</html>
