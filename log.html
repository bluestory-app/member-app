<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BlueStory Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 16px;
  margin: 0;
}
.card {
  max-width: 420px;
  margin: auto;
  background: #fff;
  padding: 16px;
  border-radius: 12px;
}
h2 {
  margin-top: 0;
}
.field {
  margin-bottom: 12px;
}
label {
  display: block;
  font-size: 14px;
  margin-bottom: 6px;
}
input, select, textarea {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  font-size: 14px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #fff;
}
textarea {
  resize: none;
  min-height: 100px;
}
.unit-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.unit-wrap input,
.unit-wrap select {
  flex: 1;
}
.unit {
  min-width: 24px;
  font-size: 14px;
  color: #666;
}
.fixed-box {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  font-size: 14px;
  border: 1px solid #ccc;
  border-radius: 8px;
  background: #f7f7f7;
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #eee;
}
#status {
  margin-top: 12px;
}
.lock-card {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
}
.lock-card h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="pageTitle">ログ入力</h2>

  <div class="field">
    <label for="diveCount">本数</label>
    <div class="unit-wrap">
      <input id="diveCount" type="number" placeholder="例：25">
      <span class="unit">本</span>
    </div>
  </div>

  <div class="field">
    <label for="divePoint">ダイブポイント</label>
    <input id="divePoint" placeholder="例：八丈島 ナズマド">
  </div>

  <div class="field">
    <label for="date">日付</label>
    <input id="date" type="date">
  </div>

  <div class="field">
    <label for="weather">天候</label>
    <select id="weather">
      <option value="">選択してください</option>
      <option value="晴れ">晴れ</option>
      <option value="曇り">曇り</option>
      <option value="雨">雨</option>
    </select>
  </div>

  <div class="field">
    <label for="visibility">透明度</label>
    <div class="unit-wrap">
      <input id="visibility" type="number" placeholder="例：15">
      <span class="unit">M</span>
    </div>
  </div>

  <div class="field">
    <label for="airTemp">気温</label>
    <div class="unit-wrap">
      <input id="airTemp" type="number" placeholder="例：26">
      <span class="unit">℃</span>
    </div>
  </div>

  <div class="field">
    <label for="waterTemp">水温</label>
    <div class="unit-wrap">
      <input id="waterTemp" type="number" placeholder="例：22">
      <span class="unit">℃</span>
    </div>
  </div>

  <div class="field">
    <label for="diveTime">ダイブ時間</label>
    <div class="unit-wrap">
      <input id="diveTime" type="number" placeholder="例：45">
      <span class="unit">分</span>
    </div>
  </div>

  <div class="field">
    <label for="depth">水深</label>
    <div class="unit-wrap">
      <input id="depth" type="number" placeholder="例：18">
      <span class="unit">M</span>
    </div>
  </div>

  <div class="field">
    <label for="tankType">タンク種類</label>
    <select id="tankType">
      <option value="">選択してください</option>
      <option value="アルミ">アルミ</option>
      <option value="スチール">スチール</option>
    </select>
  </div>

  <div class="field">
    <label for="tankSize">タンク容量</label>
    <div class="unit-wrap">
      <input id="tankSize" type="number" placeholder="例：10">
      <span class="unit">L</span>
    </div>
  </div>

  <div class="field">
    <label for="memo">メモ</label>
    <textarea id="memo" placeholder="自由に記入"></textarea>
  </div>

  <div class="field">
    <label>インストラクターサイン</label>
    <div class="fixed-box">IT24194 Hirahara</div>
  </div>

  <button onclick="saveLog()" id="saveButton">保存</button>
  <p id="status"></p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LOG_LIFF_ID = "2009495218-2KrxBegx";
const INSTRUCTOR_SIGN = "IT24194 Hirahara";

let profileData = {};
let editId = "";
let isEditMode = false;

function getParam(name) {
  const params = new URLSearchParams(location.search);
  return params.get(name) || "";
}

function stripUnit(value) {
  if (!value) return "";
  return String(value).replace(/[^\d.]/g, "");
}

function setTankFields(tank) {
  if (!tank) return;

  if (tank.includes("アルミ")) {
    document.getElementById("tankType").value = "アルミ";
  } else if (tank.includes("スチール")) {
    document.getElementById("tankType").value = "スチール";
  }

  document.getElementById("tankSize").value = stripUnit(tank);
}

async function loadEditData() {
  const url =
    GAS_URL +
    "?mode=logdetail" +
    "&editId=" + encodeURIComponent(editId) +
    "&userId=" + encodeURIComponent(profileData.userId);

  const res = await fetch(url);
  const data = await res.json();

  if (!data || !data.logId) {
    document.getElementById("status").textContent = "編集データが見つかりません";
    return;
  }

  document.getElementById("pageTitle").textContent = "ログ編集";
  document.getElementById("saveButton").textContent = "更新";

  document.getElementById("diveCount").value = data.diveCount || "";
  document.getElementById("divePoint").value = data.divePoint || "";
  document.getElementById("date").value = data.date ? String(data.date).split("T")[0] : "";
  document.getElementById("weather").value = data.weather || "";
  document.getElementById("visibility").value = stripUnit(data.visibility);
  document.getElementById("airTemp").value = stripUnit(data.airTemp);
  document.getElementById("waterTemp").value = stripUnit(data.waterTemp);
  document.getElementById("diveTime").value = stripUnit(data.diveTime);
  document.getElementById("depth").value = stripUnit(data.depth);
  setTankFields(data.tank || "");
  document.getElementById("memo").value = data.memo || "";
}

async function main() {
  await liff.init({
    liffId: LOG_LIFF_ID
  });

  if (!liff.isLoggedIn()) {
    liff.login({ redirectUri: location.href });
    return;
  }

  profileData = await liff.getProfile();

  const checkUrl =
    GAS_URL +
    "?mode=membercheck" +
    "&userId=" + encodeURIComponent(profileData.userId);

  const checkRes = await fetch(checkUrl);
  const checkText = await checkRes.text();

  if (checkText !== "OK") {
    document.body.innerHTML = `
      <div class="lock-card">
        <h2>ログ利用制限</h2>
        <p>このページは会員登録済みの方のみご利用いただけます。</p>
        <p>ご不明な場合はスタッフへご連絡ください。</p>
      </div>
    `;
    return;
  }

  editId = getParam("editId");
  isEditMode = !!editId;

  if (isEditMode) {
    await loadEditData();
  }
}

async function saveLog() {
  const tankType = document.getElementById("tankType").value;
  const tankSize = document.getElementById("tankSize").value;
  const tank = tankType && tankSize ? `${tankType} ${tankSize}L` : "";

  const data = {
    editId: isEditMode ? editId : "",
    diveCount: document.getElementById("diveCount").value,
    divePoint: document.getElementById("divePoint").value,
    date: document.getElementById("date").value,
    weather: document.getElementById("weather").value,
    visibility: document.getElementById("visibility").value ? `${document.getElementById("visibility").value}M` : "",
    airTemp: document.getElementById("airTemp").value ? `${document.getElementById("airTemp").value}℃` : "",
    waterTemp: document.getElementById("waterTemp").value ? `${document.getElementById("waterTemp").value}℃` : "",
    diveTime: document.getElementById("diveTime").value ? `${document.getElementById("diveTime").value}分` : "",
    depth: document.getElementById("depth").value ? `${document.getElementById("depth").value}M` : "",
    tank: tank,
    memo: document.getElementById("memo").value,
    instructorSign: INSTRUCTOR_SIGN,
    name: profileData.displayName,
    userId: profileData.userId
  };

  await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  document.getElementById("status").textContent = isEditMode ? "更新しました" : "保存しました";
}

main();
</script>

</body>
</html>
