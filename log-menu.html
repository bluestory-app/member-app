<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ログメニュー</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: 24px auto;
  background: #fff;
  padding: 28px 20px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

h2 {
  margin: 0 0 12px;
  font-size: 28px;
  text-align: center;
}

.desc {
  text-align: center;
  font-size: 16px;
  color: #666;
  margin-bottom: 20px;
}

.btn {
  display: block;
  width: 100%;
  height: 52px;
  line-height: 52px;
  text-align: center;
  font-size: 17px;
  border-radius: 12px;
  border: none;
  text-decoration: none;
  margin-top: 10px;
  box-sizing: border-box;
}

.btn-main {
  background: #222;
  color: #fff;
}

.btn-sub {
  background: #e9e9e9;
  color: #111;
}

.lock-card {
  max-width: 420px;
  margin: 40px auto;
  background: #fff;
  padding: 24px;
  border-radius: 12px;
  text-align: center;
}
</style>
</head>

<body>

<div class="card" id="menuArea" style="display:none;">
  <h2>ログ</h2>
  <p class="desc">選択してください</p>

  <button class="btn btn-main" onclick="goLogCreate()">ログ作成</button>
  <button class="btn btn-sub" onclick="goLogList()">ログ履歴</button>
</div>

<div class="lock-card" id="lockArea" style="display:none;">
  <h2>利用制限</h2>
  <p>このページは会員登録済みの方のみ利用できます。</p>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbzvaxVl03JQFoWcXT7QXoK23Z9kdv-0Uudq7oFNSQpluDh1pJWdhKn7pMey9sA4MRBf/exec";
const LIFF_ID = "2009495218-2KrxBegx";

async function main() {
  try {
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    const profile = await liff.getProfile();

    const res = await fetch(
      GAS_URL +
      "?mode=membercheck" +
      "&userId=" + encodeURIComponent(profile.userId)
    );

    const text = (await res.text()).trim();

    if (text !== "OK") {
      document.getElementById("lockArea").style.display = "block";
      return;
    }

    document.getElementById("menuArea").style.display = "block";

  } catch (e) {
    document.getElementById("lockArea").style.display = "block";
  }
}

function goLogCreate() {
  location.href = "log.html";
}

function goLogList() {
  location.href = "log-list.html";
}

main();
</script>

</body>
</html>
